server {
    listen 8080;
    server_name localhost;

    # OIDC Discovery, JWKS, and OAuth2
    location ~ ^/(\.well-known|oauth2|oidc) {
        proxy_pass http://gosso:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GOSSO APIs
    location /api/v1/ {
        proxy_pass http://gosso:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # System readiness used by the GOSSO admin dashboard
    location = /readiness {
        proxy_pass http://gosso:8080/readiness;
        add_header Cache-Control "no-store" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blog Backend APIs
    location /api/ {
        proxy_pass http://blog-backend:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI & OpenAPI Spec
    location /swagger {
        proxy_pass http://blog-backend:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GOSSO Admin console mounted away from the blog /admin route
    location = /identity-admin {
        return 301 /identity-admin/;
    }

    location /identity-admin/ {
        proxy_pass http://gosso-admin-frontend:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Frontend static files & SPA routing
    location / {
        proxy_pass http://blog-frontend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
