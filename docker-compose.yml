services:
  db:
    image: postgres:15-alpine
    container_name: sso-blog-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sso-blog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog-backend:
    build:
      context: .
      dockerfile: blog-backend/Dockerfile
    container_name: sso-blog-backend
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=blog
      - REDIS_URL=redis://redis:6379/0
      - SSO_JWKS_URL=${SSO_JWKS_URL:-http://host.docker.internal:8088/.well-known/jwks.json}
      - SSO_TOKEN_ISSUER=${SSO_TOKEN_ISSUER:-http://localhost:8088}
      - SSO_CLIENT_ID=${SSO_CLIENT_ID:-blog-spa}
    depends_on:
      db:
        condition: service_healthy

  blog-frontend:
    build:
      context: ./blog-frontend
      dockerfile: Dockerfile
      args:
        VITE_GOSSO_ISSUER: ${VITE_GOSSO_ISSUER:-http://localhost:8088}
        VITE_GOSSO_CLIENT_ID: ${VITE_GOSSO_CLIENT_ID:-blog-spa}
    container_name: sso-blog-frontend
    depends_on:
      - blog-backend

  gateway:
    image: nginx:stable-alpine
    container_name: sso-blog-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - blog-frontend
      - blog-backend

volumes:
  db_data:
