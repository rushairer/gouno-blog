name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: blog-backend/go.mod
          cache-dependency-path: blog-backend/go.sum

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose config validation
        run: docker compose config

      - name: Source override Compose config validation
        run: docker compose -f docker-compose.yml -f docker-compose.source.yml config
