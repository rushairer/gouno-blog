services:
  blog-client-seed:
    build:
      context: ./seed
      dockerfile: Dockerfile

  blog-backend:
    build:
      context: .
      dockerfile: blog-backend/Dockerfile

  blog-frontend:
    build:
      context: ./blog-frontend
      dockerfile: Dockerfile
      args:
        VITE_GOSSO_ISSUER: ${VITE_GOSSO_ISSUER:-}
        VITE_GOSSO_CLIENT_ID: ${VITE_GOSSO_CLIENT_ID:-blog-spa}
